name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "Aura-Clicker" `
            --icon "aura_clicker/assets/logo_aura_clicker.ico" `
            --add-data "aura_clicker/assets;aura_clicker/assets" `
            --add-data "aura_clicker/theme.py;aura_clicker" `
            main.py

      - name: Package portable ZIP
        run: |
          Compress-Archive -Path "dist\Aura-Clicker\*" -DestinationPath "dist\Aura-Clicker-Windows.zip"

      - name: Build Inno Setup installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc "installer\AuraClicker.iss"
          } else {
            Write-Host "Inno Setup non disponible, skip installer"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/Aura-Clicker-Windows.zip
            dist-installer/Aura-Clicker-Setup-*.exe

  # ─── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "Aura-Clicker" \
            --icon "aura_clicker/assets/logo_aura_clicker.ico" \
            --add-data "aura_clicker/assets:aura_clicker/assets" \
            --add-data "aura_clicker/theme.py:aura_clicker" \
            main.py

      - name: Create DMG
        run: |
          brew install create-dmg || true
          if command -v create-dmg &> /dev/null; then
            create-dmg \
              --volname "Aura-Clicker" \
              --volicon "aura_clicker/assets/logo_aura_clicker.ico" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --app-drop-link 425 120 \
              "dist/Aura-Clicker-macOS.dmg" \
              "dist/Aura-Clicker"
          else
            # Fallback : archive tar.gz
            cd dist && tar -czf Aura-Clicker-macOS.tar.gz Aura-Clicker
            mv Aura-Clicker-macOS.tar.gz Aura-Clicker-macOS.dmg
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/Aura-Clicker-macOS.*

  # ─── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb libxtst6 libxrandr2 \
            libxfixes3 libxi6 libxext6 libx11-6 scrot

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "Aura-Clicker" \
            --add-data "aura_clicker/assets:aura_clicker/assets" \
            --add-data "aura_clicker/theme.py:aura_clicker" \
            main.py

      - name: Package Linux archive
        run: |
          cd dist
          tar -czf Aura-Clicker-Linux.tar.gz Aura-Clicker/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/Aura-Clicker-Linux.tar.gz

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aura-Clicker ${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Aura-Clicker ${{ steps.version.outputs.VERSION }}

            ### Téléchargements

            | Plateforme | Fichier |
            |-----------|---------|
            | 🪟 **Windows** (installateur) | `Aura-Clicker-Setup-*.exe` |
            | 🪟 **Windows** (portable) | `Aura-Clicker-Windows.zip` |
            | 🍎 **macOS** | `Aura-Clicker-macOS.dmg` |
            | 🐧 **Linux** | `Aura-Clicker-Linux.tar.gz` |

            ### Changements
            Voir le [README](https://github.com/sputji/Aura-Clicker#changelog) pour le détail des changements.

            ---
            *Aura-Clicker — automatisation souris & clavier par [Aura Néo](https://auraneo.fr)*
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release-artifacts/**/*
